<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ship Builder</title>
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="palette">
    <div id="palette-header">
      <div id="palette-tabs">
        <button class="pal-tab active" data-kind="build">Hull</button>
        <button class="pal-tab" data-kind="module">Modules</button>
      </div>
      <input id="search" type="text" placeholder="Search parts…" autocomplete="off">
    </div>
    <div id="piece-list"></div>
  </div>

  <div id="viewport">
    <canvas id="c"></canvas>
    <div id="hud">
      <button id="btn-erase" title="Erase mode (E)">✕ Erase</button>
      <span class="sep"></span>
      <button id="btn-save" title="Save design">💾 Save</button>
      <button id="btn-load" title="Load design">📂 Load</button>
      <button id="btn-clear" title="Clear all">🗑 Clear</button>
    </div>
    <div id="hint">Left-click: place · Right-drag: orbit · WASD: move · Space/Ctrl: up/down · R: rotate · [ ]: fine rotate · E: erase</div>
  </div>

  <div id="inspector">
    <div id="piece-name">Select a part</div>
    <div id="piece-meta">
      <span id="piece-dims"></span>
      <span id="piece-rot"></span>
      <button class="rot-btn" id="rot-left"  title="Rotate left 90°">◄</button>
      <button class="rot-btn" id="rot-right" title="Rotate right 90°">►</button>
    </div>

    <div class="inspector-section-label">Shape</div>
    <div id="shape-picker"></div>

    <div id="orient-section" style="display:none">
      <div class="inspector-section-label">Orientation</div>
      <div id="orient-picker">
        <button class="orient-btn active" id="orient-h" title="Horizontal (default)">
          <svg viewBox="0 0 28 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="1" y="5" width="26" height="10" rx="2" stroke="currentColor" stroke-width="1.5" fill="rgba(0,212,255,0.15)"/>
            <line x1="9" y1="5" x2="9" y2="15" stroke="currentColor" stroke-width="1" opacity="0.5"/>
          </svg>
        </button>
        <button class="orient-btn" id="orient-v" title="Vertical (rotated 90° on Z)">
          <svg viewBox="0 0 20 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="5" y="1" width="10" height="26" rx="2" stroke="currentColor" stroke-width="1.5" fill="rgba(0,212,255,0.15)"/>
            <line x1="5" y1="9" x2="15" y2="9" stroke="currentColor" stroke-width="1" opacity="0.5"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="inspector-section-label">Flip</div>
    <div id="symmetry-picker">
      <button class="sym-btn" data-axis="0" title="Mirror left ↔ right">↔ X</button>
      <button class="sym-btn" data-axis="1" title="Mirror up ↕ down">↕ Y</button>
      <button class="sym-btn" data-axis="2" title="Mirror front ↔ back">⇄ Z</button>
    </div>

    <div class="inspector-section-label">Part stats</div>
    <div id="specs"></div>

    <div class="inspector-divider"></div>
    <div class="inspector-section-label">Ship viability</div>
    <div id="ship-stats"><div class="ship-empty">Place parts to see stats</div></div>
  </div>

  <!-- ── Modals ── -->
  <div id="modal-overlay">

    <div class="modal" id="modal-clear">
      <div class="modal-title">Clear All</div>
      <div class="modal-body">Remove all placed parts from the grid?</div>
      <div class="modal-actions">
        <button class="modal-btn" id="modal-clear-cancel">Cancel</button>
        <button class="modal-btn danger" id="modal-clear-ok">Clear</button>
      </div>
    </div>

    <div class="modal" id="modal-save">
      <div class="modal-title">Save Build</div>
      <textarea class="modal-textarea" id="modal-save-text" readonly spellcheck="false"></textarea>
      <div class="modal-hint" id="modal-save-hint"></div>
      <div class="modal-actions">
        <button class="modal-btn" id="modal-save-copy">Copy to clipboard</button>
        <button class="modal-btn primary" id="modal-save-close">Close</button>
      </div>
    </div>

    <div class="modal" id="modal-load">
      <div class="modal-title">Load Build</div>
      <textarea class="modal-textarea" id="modal-load-text" placeholder="Paste build JSON here…" spellcheck="false"></textarea>
      <div class="modal-hint error" id="modal-load-error" style="display:none"></div>
      <div class="modal-actions">
        <button class="modal-btn" id="modal-load-cancel">Cancel</button>
        <button class="modal-btn primary" id="modal-load-ok">Load</button>
      </div>
    </div>

  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
